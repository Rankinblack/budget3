  <!-- App styles -->
  <style>
    html, body { background: #F6F2EA; }
    body { font-family: "IBM Plex Sans Arabic","IBM Plex Sans",system-ui,sans-serif; -webkit-font-smoothing:antialiased; color:#13181A; }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" on, "lnum" on; }
    .tnum { font-variant-numeric: tabular-nums; }
    .latin { font-family: "IBM Plex Sans","IBM Plex Sans Arabic",system-ui,sans-serif; }
    /* RTL niceties */
    input, select, textarea { font-family: inherit; }
    /* Hide spinner buttons on number inputs */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(20,30,33,.12); border-radius: 10px; border: 2px solid #F6F2EA; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(20,30,33,.22); }
    /* dotted divider */
    .dotted-x { background-image: radial-gradient(circle, rgba(20,30,33,.18) 1px, transparent 1px); background-size: 6px 1px; background-repeat: repeat-x; background-position: center; }
    /* selection */
    ::selection { background: #C99334; color: #fff; }

    /* Mobile drawer — slides in from the right (RTL) */
    .drawer-closed { transform: translateX(100%); }
    .drawer-open   { transform: translateX(0); }
    @media (min-width: 768px) {
      .drawer-closed, .drawer-open { transform: none; }
    }

    /* Dark */
    .theme-dark, .theme-dark body { background: #0F1416; color: #ECE6D8; }
    .theme-dark .bg-sand-100 { background-color: #0F1416 !important; }
    .theme-dark .bg-sand-50  { background-color: #161D1F !important; }
    .theme-dark .bg-white    { background-color: #1A2224 !important; }
    .theme-dark .text-ink-900{ color: #EDE6D6 !important; }
    .theme-dark .text-ink-800{ color: #DDD5C4 !important; }
    .theme-dark .text-ink-700{ color: #C1BAA9 !important; }
    .theme-dark .text-ink-600{ color: #9B968A !important; }
    .theme-dark .text-ink-500{ color: #847F73 !important; }
    .theme-dark .text-ink-400{ color: #6C6860 !important; }
    .theme-dark .border-sand-200 { border-color: rgba(255,255,255,.06) !important; }
    .theme-dark .border-sand-300 { border-color: rgba(255,255,255,.10) !important; }
    .theme-dark .border-ink-900\/10 { border-color: rgba(255,255,255,.08) !important; }
    .theme-dark .shadow-soft { box-shadow: 0 1px 0 rgba(0,0,0,.5), 0 4px 18px rgba(0,0,0,.4); }
  
    /* ---- PWA / mobile additions ---- */
    /* Use dynamic viewport height so iOS address bar doesn't crop layout */
    @supports (min-height: 100dvh) {
      html, body, .min-h-screen, .h-screen { min-height: 100dvh; }
      .h-screen { height: 100dvh; }
    }
    /* Density control (Tweaks → الكثافة): scales rem-based spacing */
    html.density-compact { font-size: 15px; }
    /* Respect iOS notch / safe areas when installed to home screen */
    @media (display-mode: standalone) {
      body header { padding-top: env(safe-area-inset-top, 0px); }
      body main > div { padding-bottom: calc(6rem + env(safe-area-inset-bottom, 0px)); }
    }
    /* Avoid iOS auto-zoom on focus: inputs must be >=16px. App uses 13-14px; nudge up on small screens. */
    @media (max-width: 767px) {
      input, select, textarea { font-size: 16px !important; }
    }
    /* Smoother momentum scrolling on iOS */
    body { -webkit-overflow-scrolling: touch; }
    /* Prevent the off-screen RTL drawer from creating horizontal scroll/clipping.
       overflow-x:clip (not hidden) avoids turning the root into a scroll
       container, so the sticky header keeps working. */
    html { overflow-x: hidden; overflow-x: clip; }
    body { overflow-x: hidden; overflow-x: clip; }
</style>
